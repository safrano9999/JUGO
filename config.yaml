# Injected process env wins over config.yaml and .env
inject_overwrite: true

services:
  # JUGO web UI
  jugo:
    title: JUGO web UI
    webui:
      host: 127.0.0.1
      port: 11001
      publish_port: 11001
      env_port: JUGO_PORT
    # JUGO non-secret runtime defaults
    env:
      USE_TMUX: false
      TMUX_SHELL: false
      JUGO_TMUX_SESSION_PREFIX: jugo
      DB_TYPE: sqlite
      DB_PATH: /opt/JUGO/sqlite.db
      DB_URL: 127.0.0.1
      DB_PORT: 5432
      DB_NAME_JUGO: jugo
      DB_USER_JUGO: jugo
