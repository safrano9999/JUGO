  async function runSchool(q2Text, q3Text) {
    console.log('[runSchool] active=', schoolActive, 'config=', !!schoolConfig);
    if (!schoolActive || !schoolConfig) return;
    const pid = document.getElementById('school-provider').value;
    const model = document.getElementById('school-model').value;
    const level = document.getElementById('school-level').value;
    console.log('[runSchool] pid=', pid, 'model=', model, 'level=', level);
    if (!pid || !level) return;

    localStorage.setItem('ct_school_level', level);
    localStorage.setItem('ct_school_model', model);

    const foreignLang = document.getElementById('tgt-lang').selectedOptions[0]?.textContent.trim() || '';
    const prompt = getSchoolPrompt().replace('{level}', level);
    let message = `${prompt}\nLanguage: ${foreignLang}\n\nQuestion: ${q2Text}\nAnswer: ${q3Text}`;
    if (learnedWords.length > 0) {
      message += `\n\nDo NOT use any of these already learned words: ${learnedWords.join(', ')}`;
    }

    // Call LLM (stateless — does not affect main chat history)
    try {
      const r = await fetch(`${API}/chat`, {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ provider: pid, message, model, lang: document.getElementById('tgt-lang').selectedOptions[0]?.textContent.trim(), stateless: true, ctx: 'school' })
      });
      const d = await r.json();
      if (d.error || !d.reply) {
        setStatus('llm-status', 'err', 'School: ' + (typeof d.error === 'string' ? d.error.slice(0, 50) : d.detail?.slice(0, 50) || 'Error'));
        return;
      }

      // Parse SENTENCE: and WORD: from reply
      const lines = d.reply.trim().split('\n');
      let sentence = '', word = '';
      for (const line of lines) {
        if (line.startsWith('SENTENCE:')) sentence = line.replace('SENTENCE:', '').trim();
        if (line.startsWith('WORD:')) word = line.replace('WORD:', '').trim();
      }
      if (!sentence) sentence = d.reply.trim();

      // Track learned word
      if (word && !learnedWords.includes(word.toLowerCase())) {
        learnedWords.push(word.toLowerCase());
        localStorage.setItem('ct_school_learned_words', JSON.stringify(learnedWords));
      }

      // Show foreign
      setQ('schoolForeign', sentence);
      setQ('schoolForeignWord', word ? `📖 ${word}` : '');

      // Translate to mother tongue
      const srcLang = document.getElementById('src-lang').value || 'DE';
      const tgtCode = document.getElementById('tgt-lang').value;

      const tds = await translateText(
        sentence,
        tgtCode.replace('-US','').replace('-BR',''),
        srcLang || 'DE',
        'school-sn'
      );
      setQ('schoolNative', tds.translation || '');

      if (word) {
        const tdw = await translateText(
          word,
          tgtCode.replace('-US','').replace('-BR',''),
          srcLang || 'DE',
          'school-wn'
        );
        setQ('schoolNativeWord', tdw.translation ? `📖 ${tdw.translation}` : '');
      }

      updateQuota();

      // Add to school history
      schoolHistory.push({
        sentence, word: word || '',
        sentenceNative: tds.translation || '', wordNative: Q.schoolNativeWord.replace('📖 ', '')
      });
      localStorage.setItem('ct_school_history', JSON.stringify(schoolHistory));
      renderSchoolHistory();
      saveUserData();

      // TTS: 4 lines with individual auto toggles and provider/voice
      if (ttsProviderIds.length > 0) {
        if (document.getElementById('auto-tts-school-sn')?.checked && document.getElementById('tts-provider-school-sn')?.value) await playSchoolLine('school-sentence-native', 'school-sn');
        if (document.getElementById('auto-tts-school-sf')?.checked && document.getElementById('tts-provider-school-sf')?.value) await playSchoolLine('school-sentence-foreign', 'school-sf');
        if (document.getElementById('auto-tts-school-wn')?.checked && document.getElementById('tts-provider-school-wn')?.value) await playSchoolLine('school-word-native', 'school-wn');
        if (document.getElementById('auto-tts-school-wf')?.checked && document.getElementById('tts-provider-school-wf')?.value) await playSchoolLine('school-word-foreign', 'school-wf');
      }
    } catch(e) {
      console.error('School error:', e);
    }
  }

  // ── Load languages ──
  // Convert 2-letter country code to flag emoji
  function codeToFlag(code) {
    // Map language codes to country codes where they differ
    const langToCountry = {
      EN: 'GB', JA: 'JP', KO: 'KR', ZH: 'CN', AR: 'SA', HI: 'IN',
      BN: 'BD', UR: 'PK', FA: 'IR', HE: 'IL', VI: 'VN', EL: 'GR',
      DA: 'DK', SV: 'SE', NB: 'NO', CS: 'CZ', UK: 'UA', SL: 'SI',
      ET: 'EE', GA: 'IE', EU: 'ES', GL: 'ES', CA: 'ES', BS: 'BA',
      SQ: 'AL', HY: 'AM', KA: 'GE', MS: 'MY', TL: 'PH', SW: 'KE',
      TA: 'LK', TE: 'IN', ML: 'IN', GU: 'IN', MR: 'IN', PA: 'IN',
      AS: 'IN', NE: 'NP', MY: 'MM', KM: 'KH', LO: 'LA', SI: 'LK',
    };
    const c = code.split('-')[0].toUpperCase();
    const cc = langToCountry[c] || c;
    if (cc.length !== 2) return '';
    return String.fromCodePoint(...[...cc].map(c => 0x1F1E6 + c.charCodeAt(0) - 65));
  }

  async function updateQuota() {
    const quota = document.getElementById('deepl-quota');
    const cfg = getTranslatorConfig();
    if (!cfg.provider || cfg.kind !== 'deepl') {
      quota.style.display = 'none';
      return;
    }
    quota.style.display = '';
    try {
      const r = await fetch(`${API}/usage`);
      const d = await r.json();
      if (!r.ok || d.error || d.detail) return;
      const used = d.character_count;
      const limit = d.character_limit;
      const remaining = limit - used;
      const pct = Math.round((used / limit) * 100);
      const fill = document.getElementById('quota-fill');
      const text = document.getElementById('quota-text');
      fill.style.width = pct + '%';
      fill.style.background = pct > 90 ? 'var(--warn)' : 'var(--accent)';
      const fmt = n => n >= 1000 ? Math.round(n/1000) + 'k' : n;
      text.textContent = `${fmt(remaining)} left (${pct}%)`;
    } catch(e) {}
  }

  async function loadLanguages() {
    try {
      const r = await fetch(`${API}/languages`);
      const d = await r.json();
      const srcSel = document.getElementById('src-lang');
      const tgtSel = document.getElementById('tgt-lang');
      const savedSrc = localStorage.getItem('ct_src') || 'DE';
      const savedTgt = localStorage.getItem('ct_tgt') || 'EN-US';
      // Source: keep Auto option, add all source languages
      (d.source || []).forEach(l => {
        const flag = codeToFlag(l.code);
        const opt = new Option(`${flag} ${l.name}`, l.code);
        if (l.code === savedSrc) opt.selected = true;
        srcSel.appendChild(opt);
      });
      // Target: all target languages
      (d.target || []).forEach(l => {
        const flag = codeToFlag(l.code);
        const opt = new Option(`${flag} ${l.name}`, l.code);
        if (l.code === savedTgt) opt.selected = true;
        tgtSel.appendChild(opt);
      });
      updateQuadrantTitles();
    } catch(e) {
      console.error('Failed to load languages', e);
    }
  }

  // ── Console / OpLog ──
  let _consoleSince = 0;
  let _consoleTimer = null;
  let _consoleOpen = false;

  function toggleConsolePanel() {
    const panel = document.getElementById('console-panel');
    const btn = document.getElementById('console-toggle-btn');
    _consoleOpen = !_consoleOpen;
    panel.classList.toggle('open', _consoleOpen);
    btn.classList.toggle('open', _consoleOpen);
    if (_consoleOpen && !_consoleTimer) {
      pollConsole();
      _consoleTimer = setInterval(pollConsole, 2000);
    }
    if (!_consoleOpen && _consoleTimer) {
      clearInterval(_consoleTimer);
      _consoleTimer = null;
    }
  }

  async function pollConsole() {
    try {
      const r = await fetch(`${API}/console?since=${_consoleSince}`);
      const d = await r.json();
      if (!d.entries || d.entries.length === 0) return;
      const log = document.getElementById('console-log');
      for (const e of d.entries) {
        const line = document.createElement('div');
        const ts = new Date(e.ts * 1000);
        const timeStr = ts.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        const phase = e.phase || '';
        line.className = phase === 'error' ? 'c-error' : phase === 'init' ? 'c-init' : 'c-result';
        let html = `<span class="c-ts">${timeStr}</span>`;
        if (e.op) html += `<span class="c-op">[${e.op}]</span>`;
        if (e.q) html += `<span class="c-q">${e.q}</span>`;
        html += e.detail || '';
        if (e.error) html += ` <span style="color:#ff4444">${e.error}</span>`;
        line.innerHTML = html;
        log.appendChild(line);
        if (e.id > _consoleSince) _consoleSince = e.id;
      }
      log.scrollTop = log.scrollHeight;
    } catch(err) {}
  }

  // ── Init ──
  loadTheme();
  renderDirectives();
  (async () => {
    // Inject config panel first — elements must exist before loadLanguages etc.
    await ConfigPanel.init();
    await loadLanguages();
    loadSettings();
    loadTTSProviders();
    await loadTranslatorProviders();
    updateQuota();
    setInterval(updateQuota, 60000);
    await loadBackends();
    await loadSchoolConfig();
    initSchoolProviders();
    await loadSchoolUsers();
    renderSchoolHistory();
    // School always starts inactive — user enables manually
    // Restore direct mode
    const dt = document.getElementById('direct-toggle');
    if (dt && localStorage.getItem('ct_direct')) {
      dt.checked = true;
      applyDirectMode();
    }
    updateDirectToggleVisibility();
    // Auto-create session if backend is set but no session
    if (currentBackend && !currentSessionId) {
      await newSession();
    }
    // Re-trigger auto-refresh now that backend is ready
    const ar = document.getElementById('auto-refresh');
    if (ar && ar.checked) {
      setAutoRefresh(true);
    }
    // Initial backTranslate if Q3 has content and auto-translate is on
    setTimeout(() => {
      if (document.getElementById('auto-translate-back')?.checked && Q.q3.trim() && !Q.q4.trim()) {
        backTranslate();
      }
    }, 3000);
  })();
</script>
